services:
  - type: web
    name: docanchor
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    buildCommand: ""
    startCommand: ""
    envVars:
      - key: USE_MOCKS
        value: "true"
      - key: LLM_API_KEY
        fromSecret: LLM_API_KEY
      - key: GITHUB_TOKEN
        fromSecret: GITHUB_TOKEN
      - key: WEBHOOK_SECRET
        fromSecret: WEBHOOK_SECRET
      - key: SLACK_WEBHOOK_URL
        fromSecret: SLACK_WEBHOOK_URL
      - key: QDRANT_IN_MEMORY
        value: "true"