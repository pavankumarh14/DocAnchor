# DocAnchor Backend - Render Deployment

services:
  - type: web
    name: docanchor-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_MOCKS
        value: "true"
      - key: LLM_API_KEY
        fromSecret: LLM_API_KEY
      - key: GITHUB_TOKEN
        fromSecret: GITHUB_TOKEN
      - key: WEBHOOK_SECRET
        fromSecret: WEBHOOK_SECRET
      - key: SLACK_WEBHOOK_URL
        fromSecret: SLACK_WEBHOOK_URL
      - key: QDRANT_IN_MEMORY
        value: "true"